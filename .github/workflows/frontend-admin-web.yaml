    #     CF_PAGES_DEPLOY_HOOK_URL: ${{ needs.determine-environment.outputs.env_name == 'prod' && secrets.CF_PAGES_DEPLOY_HOOK_URL_PRD || secrets.CF_PAGES_DEPLOY_HOOK_URL_DEV }}
