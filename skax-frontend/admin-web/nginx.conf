server {
    listen 3000 default_server;

    server_tokens off;

    include /etc/nginx/mime.types;

    root    /usr/share/nginx/html;
    index   index.html index.html;

    # 로그 설정 - Kubernetes 환경에 적합하게 stdout/stderr 사용
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # kube-probe 헬스체크 요청을 위한 전용 엔드포인트 (로그 제외)
    location = /health {
      access_log off;
      return 200 "healthy\n";
    }

    # 보안 헤더 추가
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http://api.scm.local http://localhost:8081; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://api.scm.local http://localhost:8081;" always;

    # 정적 파일 캐싱 설정
    location ~* \.(?:manifest|appcache|html?|xml|json)$ {
      expires -1;
    }

    location ~* \.(?:css|js)$ {
      try_files $uri =404;
      expires 1y;
      access_log off;
      add_header Cache-Control "public";
    }

    # 이미지, 폰트 등 캐싱 설정 추가
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
      try_files $uri =404;
      expires 1y;
      access_log off;
      add_header Cache-Control "public";
    }

    # SPA 라우팅을 위한 설정
    location / {
      try_files $uri $uri/ /index.html;
    }

    error_page 404 405 /notFound;
}