{{- if .Values.backendTrafficPolicy.enabled -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "scm-api-gateway.fullname" . }}-policy
  labels:
    {{- include "scm-api-gateway.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "scm-api-gateway.fullname" . }}
  {{- with .Values.backendTrafficPolicy.timeout }}
  timeout:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
