replicaCount: 1

image:
  repository: skaxcommonagentdevacr.azurecr.io/scm-common-service
  pullPolicy: IfNotPresent
  tag: dev-20260331.39-b941571

service:
  type: ClusterIP
  port: 8080

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
  - name: eg
    namespace: envoy-gateway-system
  hostnames:
  - common.scm.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

backendTrafficPolicy:
  enabled: true
  timeout:
    http:
      requestTimeout: 0s

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http

resources: 
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 384Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 90

config:
  SERVER_PORT: "8080"
  APP_CORS_ALLOWED_ORIGINS: "http://admin.scm.local"
  DB_USERNAME: "postgres"
  DB_PASSWORD: "changeit"
  DB_URL: "postgres.database:5432"

nodeSelector: 
  role: devops

hostAliases: []